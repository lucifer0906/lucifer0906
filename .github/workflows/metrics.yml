name: Metrics
on:
  # Run automatically every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # ======================
      # 1. BASE PROFILE HEADER
      # ======================
      - name: 🧑 Base Profile Header
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lucifer0906
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 0, 8 + 11%
          filename: metrics-base.svg

      # ======================
      # 2. ACHIEVEMENTS
      # ======================
      - name: 🏆 Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lucifer0906
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 0, 8 + 11%
          filename: metrics-achievements.svg
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

      # ======================
      # 3. CODING HABITS
      # ======================
      - name: 💡 Coding Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lucifer0906
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 0, 8 + 11%
          filename: metrics-habits.svg
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200

      # ======================
      # 4. ISOMETRIC CALENDAR
      # ======================
      - name: 📅 Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lucifer0906
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 0, 8 + 11%
          filename: metrics-isocalendar.svg
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ======================
      # 5. MOST USED LANGUAGES
      # ======================
      - name: 💬 Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lucifer0906
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 0, 8 + 11%
          filename: metrics-languages.svg
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      # ======================
      # 6. TOPICS / TECHNOLOGIES
      # ======================
      - name: 📌 Topics & Technologies
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lucifer0906
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 0, 8 + 11%
          filename: metrics-topics.svg
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 0
          plugin_topics_sort: stars

      # ======================
      # 7. RECENT ACTIVITY
      # ======================
      - name: 📰 Recent Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lucifer0906
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 0, 8 + 11%
          filename: metrics-activity.svg
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_visibility: all
